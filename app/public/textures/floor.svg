<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="256" height="256" fill="#1a1a10"/>
  <!-- Stone grid -->
  <g stroke="#0d0d08" stroke-width="1.5" opacity="0.8">
    <line x1="32" y1="0" x2="32" y2="256"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="96" y1="0" x2="96" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="160" y1="0" x2="160" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
    <line x1="224" y1="0" x2="224" y2="256"/>
    <line x1="0" y1="32" x2="256" y2="32"/>
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="96" x2="256" y2="96"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="0" y1="224" x2="256" y2="224"/>
  </g>
  <!-- Subtle cracks -->
  <g stroke="#0a0a04" stroke-width="0.5" fill="none" opacity="0.4">
    <path d="M40,120 L60,118 L80,125 L100,122"/>
    <path d="M150,80 L170,85 L180,75 L200,78"/>
    <path d="M60,200 L90,195 L110,200"/>
    <path d="M180,200 L200,205 L220,198"/>
  </g>
  <!-- Color variation -->
  <g opacity="0.15">
    <rect x="5" y="5" width="30" height="30" fill="#2a2a18"/>
    <rect x="130" y="130" width="30" height="30" fill="#0a0a04"/>
    <rect x="200" y="60" width="30" height="30" fill="#222214"/>
  </g>
</svg>
