<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="floorNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="5" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="256" height="256" fill="#1a1a10" filter="url(#floorNoise)"/>
  <!-- Cobblestone grid base -->
  <g fill="none" stroke="#0d0d08" stroke-width="2" opacity="0.7">
    <!-- Horizontal lines -->
    <line x1="0" y1="42" x2="256" y2="42"/>
    <line x1="0" y1="86" x2="256" y2="86"/>
    <line x1="0" y1="130" x2="256" y2="130"/>
    <line x1="0" y1="170" x2="256" y2="170"/>
    <line x1="0" y1="214" x2="256" y2="214"/>
    <!-- Vertical lines (irregular) -->
    <line x1="38" y1="0" x2="38" y2="42"/>
    <line x1="90" y1="0" x2="90" y2="42"/>
    <line x1="156" y1="0" x2="156" y2="42"/>
    <line x1="200" y1="0" x2="200" y2="42"/>
    <!-- Row 2 verticals -->
    <line x1="52" y1="42" x2="52" y2="86"/>
    <line x1="118" y1="42" x2="118" y2="86"/>
    <line x1="170" y1="42" x2="170" y2="86"/>
    <line x1="230" y1="42" x2="230" y2="86"/>
    <!-- Row 3 verticals -->
    <line x1="30" y1="86" x2="30" y2="130"/>
    <line x1="84" y1="86" x2="84" y2="130"/>
    <line x1="148" y1="86" x2="148" y2="130"/>
    <line x1="210" y1="86" x2="210" y2="130"/>
    <!-- Row 4 verticals -->
    <line x1="60" y1="130" x2="60" y2="170"/>
    <line x1="128" y1="130" x2="128" y2="170"/>
    <line x1="184" y1="130" x2="184" y2="170"/>
    <!-- Row 5 verticals -->
    <line x1="44" y1="170" x2="44" y2="214"/>
    <line x1="100" y1="170" x2="100" y2="214"/>
    <line x1="162" y1="170" x2="162" y2="214"/>
    <line x1="222" y1="170" x2="222" y2="214"/>
    <!-- Row 6 verticals -->
    <line x1="70" y1="214" x2="70" y2="256"/>
    <line x1="136" y1="214" x2="136" y2="256"/>
    <line x1="198" y1="214" x2="198" y2="256"/>
  </g>
  <!-- Stone color variations -->
  <g opacity="0.3">
    <rect x="2" y="2" width="34" height="38" fill="#242416" rx="2"/>
    <rect x="92" y="2" width="62" height="38" fill="#111108" rx="2"/>
    <rect x="158" y="2" width="40" height="38" fill="#1e1e12" rx="2"/>
    <rect x="202" y="2" width="52" height="38" fill="#16160e" rx="2"/>
    <rect x="2" y="44" width="48" height="40" fill="#1c1c10" rx="2"/>
    <rect x="120" y="44" width="48" height="40" fill="#222214" rx="2"/>
    <rect x="172" y="44" width="56" height="40" fill="#18180e" rx="2"/>
    <rect x="2" y="88" width="26" height="40" fill="#15150b" rx="2"/>
    <rect x="86" y="88" width="60" height="40" fill="#1e1e12" rx="2"/>
    <rect x="150" y="88" width="58" height="40" fill="#111108" rx="2"/>
    <rect x="2" y="132" width="56" height="36" fill="#1a1a10" rx="2"/>
    <rect x="130" y="132" width="52" height="36" fill="#202014" rx="2"/>
    <rect x="2" y="172" width="40" height="40" fill="#16160e" rx="2"/>
    <rect x="164" y="172" width="56" height="40" fill="#1c1c10" rx="2"/>
  </g>
  <!-- Surface wear / scratches -->
  <g stroke="#0a0a06" stroke-width="0.4" fill="none" opacity="0.3">
    <path d="M10,10 L30,12 L50,8"/>
    <path d="M100,70 L130,68 L150,75"/>
    <path d="M60,140 L90,145 L120,140"/>
    <path d="M200,200 L230,198 L250,204"/>
    <path d="M40,230 L70,228 L80,235"/>
  </g>
  <!-- Subtle highlight strips -->
  <g fill="none" stroke="#2e2e1c" stroke-width="0.3" opacity="0.15">
    <line x1="3" y1="3" x2="35" y2="3"/>
    <line x1="93" y1="3" x2="153" y2="3"/>
    <line x1="54" y1="45" x2="116" y2="45"/>
    <line x1="3" y1="89" x2="27" y2="89"/>
    <line x1="3" y1="133" x2="57" y2="133"/>
  </g>
</svg>
