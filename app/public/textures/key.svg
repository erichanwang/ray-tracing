<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="keyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" fill="transparent"/>
  <circle cx="32" cy="32" r="22" fill="url(#keyGlow)"/>
  <g transform="translate(32,32)">
    <!-- Key bow -->
    <circle cx="0" cy="-8" r="8" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="0" cy="-8" r="3" fill="#f59e0b" opacity="0.5"/>
    <!-- Key shaft -->
    <rect x="-1.5" y="-2" width="3" height="16" rx="1" fill="#fbbf24"/>
    <!-- Key teeth -->
    <rect x="-1.5" y="14" width="5" height="2" fill="#fbbf24"/>
    <rect x="-1.5" y="10" width="4" height="2" fill="#fbbf24"/>
  </g>
</svg>
